/*

   cody.cfg — mTCP compile-time configuration for cody
   Mirrors HTGET.CFG with streaming-friendly buffer sizes.

*/

#ifndef CONFIG_H
#define CONFIG_H

#define MTCP_PROGRAM_NAME "cody"

#include "global.cfg"

#define COMPILE_ARP
#define IP_FRAGMENTS_ON
#define COMPILE_UDP
#define COMPILE_TCP
#define COMPILE_DNS
#define COMPILE_ICMP

/* More packet buffers for streaming responses */
#undef  PACKET_BUFFERS
#define PACKET_BUFFERS           (20)

/* More transmit buffers so second request doesn't stall waiting for ACKs */
#undef  TCP_MAX_XMIT_BUFS
#define TCP_MAX_XMIT_BUFS        (20)

/* Larger socket queues for streaming — more buffering before window closes */
#undef  TCP_SOCKET_RING_SIZE
#define TCP_SOCKET_RING_SIZE      (12)

#endif
